<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain Course</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <!-- highlight.js theme (code blocks stay dark in both UI themes) -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
</head>
<body>
  <header class="topbar">
    <button id="menuBtn" class="icon-btn" title="Menu" aria-label="Toggle navigation">☰</button>
    <div class="brand"><span class="dot"></span> LangChain Course <small>· for LLM Engineers</small></div>
    <div class="spacer"></div>
    <input id="search" class="search" type="search" placeholder="Filter modules…" aria-label="Filter modules" />
    <button id="themeBtn" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">☀️</button>
  </header>

  <div class="layout">
    <aside class="sidebar"><nav id="nav"></nav></aside>
    <main class="content-wrap"><article id="content"></article></main>
    <aside class="rail"><div id="toc"></div></aside>
  </div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
  <!-- Course data + app -->
  <script src="assets/manifest.js"></script>
  <script src="assets/reader.js"></script>
</body>
</html>
